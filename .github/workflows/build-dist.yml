name: Build and push to dist branch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Assemble dist folder
        run: |
          cp -r .next/standalone dist
          cp -r .next/static dist/.next/static
          cp -r public dist/public

      - name: Write helper files
        run: |
          python3 -c "
          import json
          pkg = {'name': 'soc-challenge', 'version': '1.0.0', 'scripts': {'start': 'node server.js'}}
          open('dist/package.json', 'w').write(json.dumps(pkg, indent=2))
          open('dist/.env.example', 'w').write('NEXT_PUBLIC_SUPABASE_URL=https://your-project.supabase.co\nNEXT_PUBLIC_SUPABASE_ANON_KEY=your-anon-key\nPORT=3000\nHOSTNAME=0.0.0.0\n')
          print('done')
          "

      - name: Push to dist branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b dist
          git add -A
          git commit -m "dist: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push -f origin dist
